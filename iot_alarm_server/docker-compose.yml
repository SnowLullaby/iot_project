services:
  postgres:
    image: postgres:16
    container_name: iot_alarm_postgres
    environment:
      POSTGRES_DB: iot_alarm
      POSTGRES_USER: iot_user
      POSTGRES_PASSWORD: iot_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iot_user -d iot_alarm"]
      interval: 5s
      timeout: 5s
      retries: 10

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: iot_alarm_mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -h localhost -t '$$SYS/broker/version' -C 1 -W 3 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build: .
    container_name: iot_alarm_server
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://iot_user:iot_password@postgres:5432/iot_alarm
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_USERNAME: iot_user
      MQTT_PASSWORD: iot_password
      MQTT_TOPIC: iot/alarm/+/+
    ports:
      - "8000:8000"

volumes:
  postgres_data:
