<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка IoT Alarm</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #18212f;
      margin: 0;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 18px;
    }

    h2 {
      margin: 24px 0 12px;
      font-size: 20px;
    }

    h2:first-of-type {
      margin-top: 0;
    }

    label {
      display: block;
      margin: 14px 0 6px;
      font-weight: 600;
    }

    input {
      display: block;
      width: 100%;
      max-width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccd5e3;
      border-radius: 8px;
      font-size: 15px;
      background: #fff;
    }

    button {
      margin-top: 20px;
      border: none;
      background: #1f4b99;
      color: white;
      border-radius: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      opacity: 0.95;
    }

    .ok {
      background: #e9f8ee;
      color: #175c2c;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 16px;
    }

    a {
      color: #1f4b99;
    }

    .hint {
      color: #607089;
      font-size: 14px;
      margin-top: 6px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <main>
    <p><a href="/">← Назад</a></p>

    <section class="card">
      <h1>Админская страница</h1>

      {% if saved %}
        <div class="ok">Настройки сохранены и отправлены устройствам.</div>
      {% endif %}

      <form method="post" action="/ui/admin">
        <h2>Пороги влажности</h2>

        <label>Нижний порог влажности (%)</label>
        <input type="number" step="0.1" name="humidity_low_threshold" value="{{ settings.humidity_low_threshold }}" required>

        <label>Верхний порог влажности (%)</label>
        <input type="number" step="0.1" name="humidity_high_threshold" value="{{ settings.humidity_high_threshold }}" required>

        <h2>Пороги температуры</h2>

        <label>Нижний порог температуры (°C)</label>
        <input type="number" step="0.1" name="temperature_low_threshold" value="{{ settings.temperature_low_threshold }}" required>

        <label>Верхний порог температуры (°C)</label>
        <input type="number" step="0.1" name="temperature_high_threshold" value="{{ settings.temperature_high_threshold }}" required>

        <h2>Камера</h2>

        <label>JPEG quality</label>
        <input type="number" min="10" max="63" name="camera_jpeg_quality" value="{{ settings.camera_jpeg_quality }}" required>
        <div class="hint">Допустимый диапазон: от 10 до 63.</div>

        <button type="submit">Сохранить</button>
      </form>
    </section>
  </main>
</body>
</html>
